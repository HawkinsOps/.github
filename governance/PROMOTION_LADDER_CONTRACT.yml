schema_version: 1
status: PHASE_1_DOCUMENTED_CONTRACT_ONLY
control_type: promotion_ladder_contract
authority_statement: "Human review remains promotion authority. Green CI is not authority. Codex is AI labor, not human governance."
global_status_values:
  - SOURCE_EXISTS
  - CONTROLLED_TEST_VALIDATED
  - PLATFORM_VISIBILITY_ONLY
  - PRIVATE_INTERNAL_BOUNDARY_CONTEXT
  - PROOF_RECORD_PENDING
  - PUBLIC_ROUTE_PENDING
  - PUBLIC_ROUTE_SAFE
  - PUBLIC_SUMMARY_SAFE
  - PUBLIC_PROOF_SAFE
  - NOT_PUBLIC_SAFE
  - BLOCKED
  - REPORT_ONLY
  - FAIL_CLOSED
  - HUMAN_REVIEW_REQUIRED
layers:
  - layer_name: "organization_control_plane"
    ladder_position: 1
    owner_repo: ".github"
    allowed_inherited_truth:
      - "Repository ownership boundaries."
      - "Reviewer routing instructions."
      - "Observed workflow names and job contexts."
      - "Documented blocked-claim policy."
    blocked_inherited_truth:
      - "Detection correctness."
      - "Validation pass/fail truth."
      - "Runtime-active state."
      - "Signal-observed state."
      - "Evidence-linked public proof."
      - "Public-safe status."
    required_promotion_gates:
      - "Approved source-controlled contract update."
      - "YAML parse and markdown sanity checks for contract docs."
      - "Private-term and blocked-claim scan."
      - "Human review before merge or promotion."
    status_values:
      - SOURCE_EXISTS
      - REPORT_ONLY
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
  - layer_name: "platform_runtime_agent_boundary"
    ladder_position: 2
    owner_repo: "hawkinsoperations-platform"
    allowed_inherited_truth:
      - "Detection IDs and bounded validation claims from detections/validation when referenced as inputs."
      - "Private runtime receipt schema shape when kept private and reviewed."
      - "Status/plan visibility without proof promotion."
    blocked_inherited_truth:
      - "Platform docs prove deployment."
      - "Platform contract proves runtime-active public proof."
      - "Platform status proves signal-observed public proof."
      - "Platform support lane approves disposition."
    required_promotion_gates:
      - "Platform verifier passes for exact contract scope."
      - "Private metadata remains private where applicable."
      - "NOT_PUBLIC_SAFE and BLOCKED fields are preserved where runtime evidence is private or absent."
      - "Human review before any runtime or public-proof wording."
    status_values:
      - PLATFORM_VISIBILITY_ONLY
      - PRIVATE_INTERNAL_BOUNDARY_CONTEXT
      - NOT_PUBLIC_SAFE
      - BLOCKED
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
  - layer_name: "detection_source"
    ladder_position: 3
    owner_repo: "hawkinsoperations-detections"
    allowed_inherited_truth:
      - "A detection source artifact exists when committed and reviewed."
      - "Source metadata can reference intended validation gates."
    blocked_inherited_truth:
      - "Source existence proves controlled-test validation."
      - "Source existence proves runtime-active state."
      - "Source existence proves public-safe proof."
      - "Source existence proves live SIEM, IdP, Splunk, Wazuh, Cribl, or Security Onion proof."
    required_promotion_gates:
      - "Source contract check for the detection family."
      - "Source status file preserves blocked claims."
      - "Validation repo creates and passes deterministic fixture validation before validation claims."
      - "Human review before source status wording widens."
    status_values:
      - SOURCE_EXISTS
      - CONTROLLED_TEST_VALIDATED
      - NOT_PUBLIC_SAFE
      - BLOCKED
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
  - layer_name: "validation_behavior"
    ladder_position: 4
    owner_repo: "hawkinsoperations-validation"
    allowed_inherited_truth:
      - "Controlled fixture pass/fail results generated by deterministic validators."
      - "Validation result parity when expected reports match validator output."
      - "Claim-boundary scan result for scoped validation artifacts."
    blocked_inherited_truth:
      - "Validation proves runtime-active state."
      - "Validation proves signal-observed public proof."
      - "Validation proves production-ready or fleet-wide status."
      - "Report-only parity proves fail-closed enforcement."
    required_promotion_gates:
      - "Validator passes on controlled fixtures."
      - "Result parity verifier passes."
      - "Claim-boundary scanner passes."
      - "Cross-repo parity is promoted to fail-closed only under separate approval."
      - "Human review before proof or website wording uses validation."
    status_values:
      - CONTROLLED_TEST_VALIDATED
      - REPORT_ONLY
      - FAIL_CLOSED
      - NOT_PUBLIC_SAFE
      - BLOCKED
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
  - layer_name: "proof_ceiling"
    ladder_position: 5
    owner_repo: "hawkinsoperations-proof"
    allowed_inherited_truth:
      - "Reviewed source and validation facts linked to proof records."
      - "Proof-record claim ceilings."
      - "Public evidence linkage only when the proof index supports it."
    blocked_inherited_truth:
      - "Raw private evidence is public-safe."
      - "Runtime-active public proof exists without approved evidence linkage."
      - "Signal-observed public proof exists without approved evidence linkage."
      - "Proof integrity checks approve production readiness."
    required_promotion_gates:
      - "Proof record exists."
      - "Proof index links source, validation, platform, and website routes where applicable."
      - "Proof integrity check passes."
      - "Private-term scan passes."
      - "Blocked-claim scan passes."
      - "Raylee approves any PUBLIC_PROOF_SAFE or PUBLIC_SAFE release."
    status_values:
      - PROOF_RECORD_PENDING
      - CONTROLLED_TEST_VALIDATED
      - PUBLIC_PROOF_SAFE
      - NOT_PUBLIC_SAFE
      - BLOCKED
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
  - layer_name: "website_rendering"
    ladder_position: 6
    owner_repo: "hawkinsoperations-website"
    allowed_inherited_truth:
      - "Approved public wording from proof records."
      - "Routes to source, validation, platform, and proof records."
      - "Bounded public summaries that do not widen proof."
    blocked_inherited_truth:
      - "Website rendering proves source truth."
      - "Website rendering proves validation truth."
      - "Website rendering proves runtime, signal, evidence, public-safe, or production status."
    required_promotion_gates:
      - "Proof record exists for claim-bearing public routes."
      - "Website contract check passes."
      - "Private-term scan passes for changed public-facing files."
      - "Blocked-claim scan confirms claims remain blocked or explicitly not claimed."
      - "Human review before public-safe release."
    status_values:
      - PUBLIC_ROUTE_PENDING
      - PUBLIC_ROUTE_SAFE
      - PUBLIC_SUMMARY_SAFE
      - PUBLIC_PROOF_SAFE
      - NOT_PUBLIC_SAFE
      - BLOCKED
      - HUMAN_REVIEW_REQUIRED
    human_review_requirement: true
